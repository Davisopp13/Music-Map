<!doctype html>
<!-- Offline fallback, served by sw.js when a navigation can't reach the
     network. Fully self-contained (inline styles, CSS-drawn record) so it
     renders with zero other assets. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#efe7d6">
<title>Music History Map — offline</title>
<style>
  body {
    margin: 0;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #efe7d6;
    color: #2b2620;
    font-family: Georgia, 'Times New Roman', serif;
    text-align: center;
    padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
  }
  .record {
    width: 96px;
    height: 96px;
    margin: 0 auto 28px;
    border-radius: 50%;
    border: 3px solid #faf5ea;
    box-shadow: 0 3px 14px rgba(43, 38, 32, 0.35);
    background: repeating-radial-gradient(circle, #241f19 0 2px, #363026 2px 4px);
    position: relative;
  }
  .record::after {
    content: "";
    position: absolute;
    inset: 50%;
    width: 30px;
    height: 30px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: #a8431f;
  }
  .eyebrow {
    font-family: 'Avenir Next Condensed', 'Arial Narrow', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    font-size: 11px;
    color: #a8431f;
    margin: 0 0 10px;
  }
  h1 {
    font-size: 26px;
    font-weight: 600;
    margin: 0 0 10px;
  }
  p {
    font-size: 15px;
    line-height: 1.6;
    color: #6d6258;
    max-width: 36ch;
    margin: 0 auto 24px;
  }
  button {
    font-family: 'Avenir Next Condensed', 'Arial Narrow', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 12px;
    font-weight: 600;
    color: #2b2620;
    background: #faf5ea;
    border: 2px solid #2b2620;
    border-radius: 6px;
    padding: 12px 22px;
    cursor: pointer;
  }
  button:active { transform: scale(0.97); }
</style>
</head>
<body>
  <main>
    <div class="record" aria-hidden="true"></div>
    <p class="eyebrow">✦ Intermission ✦</p>
    <h1>The map needs a signal.</h1>
    <p>The atlas streams its tiles and tunes — reconnect and it picks up
    right where the needle left off.</p>
    <button onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
